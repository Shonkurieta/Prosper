version: '3.8'

services:
  db:
    image: postgres:15
    container_name: prosper_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: prosper
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prosper_backend
    ports:
      - "8080:8080"
    environment:
      # Указываем бэкенду, что база находится в сервисе 'db'
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/prosper
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=12345
      # Эти параметры помогут перекрыть настройки из твоего application.yml
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
    volumes:
      - ./backend/assets:/app/assets
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
