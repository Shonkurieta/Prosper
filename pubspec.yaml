name: prosper
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  http: ^1.2.0
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.3
  google_sign_in: ^6.2.1
  image_picker: ^0.8.7+5
  path: ^1.8.2
  flutter_dotenv: ^5.1.0
  provider: ^6.1.1
  file_picker: ^8.1.4
  archive: ^3.6.1
  xml: ^6.5.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - backend/assets/covers/
    - backend/assets/fonts/
  fonts:
    - family: TimesNewRoman
      fonts:
        - asset: backend/assets/fonts/timesnewromanpsmt.ttf

    - family: Montserrat
      fonts:
        - asset: backend/assets/fonts/Montserrat-Black.ttf
          weight: 900

    - family: CormorantGaramond
      fonts:
        - asset: backend/assets/fonts/CormorantGaramond-Bold.ttf
          weight: 700

    - family: Merriweather
      fonts:
        - asset: backend/assets/fonts/Merriweather-Black.ttf
          weight: 900

    - family: EBGaramond
      fonts:
        - asset: backend/assets/fonts/EBGaramond-VariableFont_wght.ttf

    - family: Georgia
      fonts:
        - asset: backend/assets/fonts/georgia.ttf

    - family: Helvetica
      fonts:
        - asset: backend/assets/fonts/helvetica_regular.otf

    - family: NotoSans
      fonts:
        - asset: "backend/assets/fonts/NotoSans-VariableFont_wdth,wght.ttf"

    - family: Oswald
      fonts:
        - asset: backend/assets/fonts/Oswald-VariableFont_wght.ttf

    - family: Roboto
      fonts:
        - asset: "backend/assets/fonts/Roboto-VariableFont_wdth,wght.ttf"

    - family: ZAriaText
      fonts:
        - asset: backend/assets/fonts/zAriaTextG3-Regular.otf

flutter_launcher_icons:
  android: true
  image_path: "backend/assets/icon/icon.png"